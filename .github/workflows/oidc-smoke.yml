name: oidc-smoke
on: workflow_dispatch

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::202533506375:role/sustainable-fsa-github-actions
          aws-region: us-west-2

      - name: Identity
        run: aws sts get-caller-identity

      - name: S3 write + read + delete probe
        run: |
          echo "oidc probe $(date -u +%FT%TZ)" > probe.txt
          aws s3 cp probe.txt s3://sustainable-fsa/_oidc-test/probe.txt
          aws s3 cp s3://sustainable-fsa/_oidc-test/probe.txt fetched.txt
          diff probe.txt fetched.txt
          aws s3 rm s3://sustainable-fsa/_oidc-test/probe.txt

      - name: Portal-protect Deny probe (must FAIL to write index.html)
        run: |
          if aws s3 cp probe.txt s3://sustainable-fsa/index.html 2>err.log; then
            echo "ERROR: Deny statement did not block portal overwrite"; exit 1
          else
            echo "Deny works:"; cat err.log
          fi

      - name: CloudFront invalidation probe
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1BNL6ONVN84RI \
            --paths "/_oidc-test/probe.txt" \
            --query "Invalidation.Status" --output text
